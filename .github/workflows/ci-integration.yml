name: CI Build & Integration Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BASE_PORT: 60000

jobs:
  build-and-test-windows:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create and activate venv, install build deps
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install pyinstaller flake8 pytest
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\pip\Cache
          key: v1-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            v1-pip-

      - name: Prepare viewer directory
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path viewer)) { New-Item -ItemType Directory -Path viewer | Out-Null }
          $htmlPath = "viewer/timeline_viewer.html"
          if (-not (Test-Path $htmlPath)) {
            @"
          <!DOCTYPE html>
          <html><head><meta charset='utf-8'><title>Timeline Viewer</title></head>
          <body><h1>Timeline Viewer Test Page</h1></body></html>
          "@ | Out-File -FilePath $htmlPath -Encoding UTF8
          }

      - name: Run linter (flake8)
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          flake8 .

      - name: Run fast tests
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          pytest -m "not integration" -vv

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .\.venv\Scripts\Activate.ps1
          Write-Host "Building with PyInstaller..."
          pyinstaller --clean --onefile --console --add-data "viewer;viewer" launch_viewer_webview.py
          if (-not (Test-Path "dist/launch_viewer_webview.exe")) {
            Write-Error "PyInstaller build failed - EXE not found"
            exit 1
          }
          Write-Host "Build successful: $(Get-Item dist/launch_viewer_webview.exe | Select-Object Length)"

      - name: Run integration tests (EXE via pytest)
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          $env:TEST_EXE="dist/launch_viewer_webview.exe"
          pytest -m integration -s -vv

      - name: Upload integration test artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: integration-test-artifacts-${{ github.run_number }}
          path: integration_test_artifacts/
          retention-days: 7

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-artifacts-${{ github.run_number }}
          path: |
            dist/launch_viewer_webview.exe
            build/
            *.spec
          retention-days: 30

      - name: Test summary
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== BUILD SUMMARY ==="
          Write-Host "Commit: ${{ github.sha }}"
          Write-Host "Branch: ${{ github.ref_name }}"
          if (Test-Path "dist/launch_viewer_webview.exe") {
            $exe = Get-Item "dist/launch_viewer_webview.exe"
            Write-Host "EXE Size: $($exe.Length) bytes"
            Write-Host "EXE Modified: $($exe.LastWriteTime)"
          }
          Write-Host "====================="

  build-and-test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Prepare viewer directory
        run: |
          mkdir -p viewer
          if [ ! -f viewer/timeline_viewer.html ]; then
            cat <<EOF > viewer/timeline_viewer.html
          <!DOCTYPE html>
          <html>
          <head><meta charset='utf-8'><title>Timeline Viewer</title></head>
          <body><h1>Timeline Viewer Test Page</h1></body>
          </html>
          EOF
          fi

      - name: Run fast tests
        run: |
          python -m pytest -m "not integration" -vv

      - name: Run integration tests
        run: |
          python -m pytest -m integration -s -vv

